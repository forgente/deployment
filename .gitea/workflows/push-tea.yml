name: update tea deployment information

on:
  push:
    branches:
      - main
    paths:
      - tea/version.json
      - .gitea/workflows/push-tea.yml

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: configure aws
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    - name: install aws cli
      run: |
        apt update -y && apt install -y rsync python3 python3-pip
        pip install awscli --break-system-packages
    - name: upload tea version.json to s3
      run: |
        aws s3 cp tea/version.json s3://${{ secrets.AWS_S3_BUCKET }}/tea/version.json --no-progress
    - name: verify uploaded tea version.json
      env:
        VERSION_FILE: tea/version.json
        VERSION_URL: https://dl.gitea.com/tea/version.json
      run: |
        python3 - <<'PY'
        import json
        import os
        import time
        import urllib.request

        version_file = os.environ["VERSION_FILE"]
        version_url = os.environ["VERSION_URL"]

        with open(version_file, "r", encoding="utf-8") as f:
            local = json.load(f)

        last_error = None
        for attempt in range(1, 7):
            try:
                with urllib.request.urlopen(version_url, timeout=30) as resp:
                    remote = json.load(resp)
                if remote == local:
                    print(f"verified {version_url}")
                    break
                last_error = f"content mismatch: remote={remote} local={local}"
            except Exception as exc:
                last_error = str(exc)

            if attempt == 6:
                raise SystemExit(f"failed to verify {version_url}: {last_error}")

            print(f"attempt {attempt} failed: {last_error}; retrying...")
            time.sleep(5)
        PY
