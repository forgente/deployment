  test-binary-pgsql:
    runs-on: ubuntu-latest
    services:
      pgsql:
        image: postgres:${{ gitea.event.inputs.pgsql_tag }}
        env:
          POSTGRES_DB: testgitea
          POSTGRES_PASSWORD: postgres
